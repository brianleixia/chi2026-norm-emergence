<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360">
  <rect width="720" height="360" fill="white"/>

  <!-- Title -->
  <text x="15" y="24" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#0d0d2a">Figure 1. BCS Trajectories by Condition (N=160 runs)</text>
  <text x="15" y="39" font-family="Georgia, serif" font-size="10" fill="#666">BCS = 1 − mean_guess/50; 0 = Level-0 (random), 1 = Level-Nash (0). Higher BCS = deeper reasoning.</text>

  <!-- Legend -->
  <rect x="540" y="12" width="165" height="88" fill="#f8f9fa" stroke="#ccc" rx="4" rx="4"/>
  <rect x="550" y="20" width="10" height="10" fill="#4f68ff" rx="1"/>
  <text x="565" y="29" font-family="Arial,sans-serif" font-size="10" fill="#333">Pure Wild (0,0,0,0)</text>
  <rect x="550" y="34" width="10" height="10" fill="#22c55e" rx="1"/>
  <text x="565" y="43" font-family="Arial,sans-serif" font-size="10" fill="#333">Full Lab (1,1,1,1)</text>
  <rect x="550" y="48" width="10" height="10" fill="#f59e0b" rx="1"/>
  <text x="565" y="57" font-family="Arial,sans-serif" font-size="10" fill="#333">Comm-only (0,1,0,0)</text>
  <rect x="550" y="62" width="10" height="10" fill="#ef4444" rx="1"/>
  <text x="565" y="71" font-family="Arial,sans-serif" font-size="10" fill="#333">Feed+Frame (1,0,1,0)</text>
  <line x1="550" y1="82" x2="560" y2="82" stroke="black" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="565" y="86" font-family="Arial,sans-serif" font-size="10" fill="#333">Grand Mean</text>

  <!-- Y axis label -->
  <text x="14" y="175" font-family="Arial,sans-serif" font-size="11" fill="#333" transform="rotate(-90,14,175)">BCS</text>

  <!-- Y axis ticks (0.0 to 0.6, step 0.1) -->
  <!-- Chart area: x=75..690, y=58..300. Height=242px for BCS 0..0.6 -->
  <!-- y = 300 - BCS*403.33 -->
  <line x1="75" y1="300" x2="690" y2="300" stroke="#333" stroke-width="1"/>
  <text x="68" y="304" font-family="Arial,sans-serif" font-size="10" text-anchor="end" fill="#333">0.0</text>
  <line x1="75" y1="243" x2="690" y2="243" stroke="#eee" stroke-width="0.5"/>
  <text x="68" y="247" font-family="Arial,sans-serif" font-size="10" text-anchor="end" fill="#333">0.1</text>
  <line x1="75" y1="186" x2="690" y2="186" stroke="#eee" stroke-width="0.5"/>
  <text x="68" y="190" font-family="Arial,sans-serif" font-size="10" text-anchor="end" fill="#333">0.2</text>
  <line x1="75" y1="129" x2="690" y2="129" stroke="#eee" stroke-width="0.5"/>
  <text x="68" y="133" font-family="Arial,sans-serif" font-size="10" text-anchor="end" fill="#333">0.3</text>
  <!-- 0.34 reference line -->
  <line x1="75" y1="111" x2="690" y2="111" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="77" y="107" font-family="Arial,sans-serif" font-size="9" fill="#ef4444" font-weight="bold">Level-1 (BCS=0.34)</text>
  <!-- 0.47 reference line -->
  <line x1="75" y1="75" x2="690" y2="75" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="77" y="71" font-family="Arial,sans-serif" font-size="9" fill="#f59e0b" font-weight="bold">Human avg (BCS≈0.47)</text>
  <line x1="75" y1="72" x2="690" y2="72" stroke="#eee" stroke-width="0.5"/>
  <text x="68" y="76" font-family="Arial,sans-serif" font-size="10" text-anchor="end" fill="#333">0.4</text>
  <line x1="75" y1="15" x2="690" y2="15" stroke="#eee" stroke-width="0.5"/>
  <text x="68" y="19" font-family="Arial,sans-serif" font-size="10" text-anchor="end" fill="#333">0.6</text>

  <!-- X axis ticks: Rounds 1-5 at x positions 120,240,360,480,600 -->
  <line x1="75" y1="300" x2="75" y2="308" stroke="#333" stroke-width="1"/>
  <text x="120" y="318" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">1</text>
  <line x1="240" y1="300" x2="240" y2="308" stroke="#333" stroke-width="1"/>
  <text x="240" y="318" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">2</text>
  <line x1="360" y1="300" x2="360" y2="308" stroke="#333" stroke-width="1"/>
  <text x="360" y="318" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">3</text>
  <line x1="480" y1="300" x2="480" y2="308" stroke="#333" stroke-width="1"/>
  <text x="480" y="318" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">4</text>
  <line x1="600" y1="300" x2="600" y2="308" stroke="#333" stroke-width="1"/>
  <text x="600" y="318" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">5</text>
  <text x="382" y="338" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="#333">Round</text>

  <!-- Pure Wild line (#4f68ff): BCS=[0.1,0.12,0.13,0.16,0.16] -->
  <!-- y = 300 - BCS*403.33 -->
  <polyline points="120,259 240,252 360,247 480,235 600,235" fill="none" stroke="#4f68ff" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="120" cy="259" r="4" fill="#4f68ff"/>
  <circle cx="240" cy="252" r="4" fill="#4f68ff"/>
  <circle cx="360" cy="247" r="4" fill="#4f68ff"/>
  <circle cx="480" cy="235" r="4" fill="#4f68ff"/>
  <circle cx="600" cy="235" r="4" fill="#4f68ff"/>

  <!-- Full Lab line (#22c55e): BCS=[0.064,0.1,0.11,0.18,0.22] -->
  <!-- mean=46.8 → BCS=0.064. BCS trajectories given: R1=0, R2=0.125, R3=0.25, R4=0.125, R5=0.25 -->
  <!-- y = 300-0*403.33=300; 300-0.125*403.33=250; 300-0.25*403.33=199; 300-0.125*403.33=250; 300-0.25*403.33=199 -->
  <polyline points="120,300 240,250 360,199 480,250 600,199" fill="none" stroke="#22c55e" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="120" cy="300" r="4" fill="#22c55e"/>
  <circle cx="240" cy="250" r="4" fill="#22c55e"/>
  <circle cx="360" cy="199" r="4" fill="#22c55e"/>
  <circle cx="480" cy="250" r="4" fill="#22c55e"/>
  <circle cx="600" cy="199" r="4" fill="#22c55e"/>

  <!-- Comm-only line (#f59e0b): mean=54.5 → BCS = 1-54.5/50 = -0.09. -->
  <!-- BCS=[-0.09,-0.04,-0.04,0.04,0.04] mapped, but clamped to visible range (BCS<0 is off chart) -->
  <!-- y = 300 - (-0.09)*403.33 = 336 → off chart top. Clamp at y=303 -->
  <polyline points="120,303 240,303 360,303 480,284 600,284" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linejoin="round" stroke-dasharray="6,3"/>
  <circle cx="120" cy="303" r="4" fill="#f59e0b"/>
  <circle cx="240" cy="303" r="4" fill="#f59e0b"/>
  <circle cx="360" cy="303" r="4" fill="#f59e0b"/>
  <circle cx="480" cy="284" r="4" fill="#f59e0b"/>
  <circle cx="600" cy="284" r="4" fill="#f59e0b"/>

  <!-- Feed+Frame line (#ef4444): BCS=[0.0,0.1,0.1,0.2,0.2] (mean=46.6, BCS=0.068) -->
  <polyline points="120,300 240,260 360,260 480,219 600,219" fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="120" cy="300" r="4" fill="#ef4444"/>
  <circle cx="240" cy="260" r="4" fill="#ef4444"/>
  <circle cx="360" cy="260" r="4" fill="#ef4444"/>
  <circle cx="480" cy="219" r="4" fill="#ef4444"/>
  <circle cx="600" cy="219" r="4" fill="#ef4444"/>

  <!-- Grand Mean dashed black line: BCS=[0.217,0.208,0.209,0.233,0.226] -->
  <!-- y=300-0.217*403.33=212; y=300-0.208*403.33=216; y=300-0.209*403.33=216; y=300-0.233*403.33=206; y=300-0.226*403.33=209 -->
  <polyline points="120,212 240,216 360,216 480,206 600,209" fill="none" stroke="#111" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="120" cy="212" r="3.5" fill="#111"/>
  <circle cx="240" cy="216" r="3.5" fill="#111"/>
  <circle cx="360" cy="216" r="3.5" fill="#111"/>
  <circle cx="480" cy="206" r="3.5" fill="#111"/>
  <circle cx="600" cy="209" r="3.5" fill="#111"/>

  <!-- Key numbers box -->
  <rect x="15" y="326" width="210" height="30" fill="#f0f0f8" stroke="#ccc" rx="4"/>
  <text x="25" y="340" font-family="Arial,sans-serif" font-size="9" fill="#333" font-weight="bold">N=160 runs | Grand mean: 49.98 | Level-1 pred: 33 | Human avg: 20–30</text>
  <text x="25" y="352" font-family="Arial,sans-serif" font-size="9" fill="#555">BCS flatlined across rounds — no learning effect in any condition</text>
</svg>